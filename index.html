<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sebilabs | Your Shop, Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;700&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sebi-blue: #4A90E2;
            --labs-green: #50C878;
            --text-dark: #2D3436;
            --bg-light: #F9F9F9;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .sebi { color: var(--sebi-blue); font-weight: 700; }
        .labs { color: var(--labs-green); font-weight: 300; }

        h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            max-width: 600px;
            line-height: 1.4;
        }

        .plans-preview {
            display: flex;
            gap: 20px;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .plan-card {
            background: white;
            padding: 20px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            border: 1px solid #eee;
        }

        .plan-card:hover { transform: translateY(-5px); }
        .plan-card.active { border: 2px solid var(--labs-green); }

        .plan-name { font-weight: 700; display: block; margin-bottom: 5px; }
        .plan-desc { font-size: 0.9rem; color: #636e72; }

        .notify-box {
            background: white;
            padding: 10px;
            border-radius: 50px;
            display: flex;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        input {
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            flex: 1;
            outline: none;
            font-size: 1rem;
        }

        button {
            background-color: var(--labs-green);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: #b2bec3;
        }
    </style>
</head>
<body>

    <div class="logo">
        <span class="sebi">sebi</span><span class="labs">labs</span>
    </div>

    <h1>Building the digital storefront for your local shop.</h1>

    <div class="plans-preview">
        <div class="plan-card">
            <span class="plan-name" style="color: #a29bfe;">Seed</span>
            <span class="plan-desc">Free Presence</span>
        </div>
        <div class="plan-card active">
            <span class="plan-name" style="color: var(--sebi-blue);">Bloom</span>
            <span class="plan-desc">Standard Growth</span>
        </div>
        <div class="plan-card">
            <span class="plan-name" style="color: #fdcb6e;">Harvest</span>
            <span class="plan-desc">Pro Automation</span>
        </div>
    </div>

    <div class="notify-box">
        <input type="email" placeholder="Enter your email for early access">
        <button>Notify Me</button>
    </div>

    <p style="margin-top: 20px; font-size: 0.9rem; color: #636e72;">Coming soon to sebilabs.com</p>

    <div class="footer">
        &copy; 2026 sebilabs. Transparency. Trust. Community.
    </div>

</body>
</html>
